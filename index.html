<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0a0612" />
<title>Cupido IA · JOSE F</title>
<meta property="og:title" content="Cupido IA 💘" />
<meta property="og:description" content="Sube tu foto y deja que la IA te enamore... o te diga la verdad sin filtros 😏" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="bg-hearts" id="hearts"></div>

<div id="app">
  <header>
    <div class="logo">JOSE F</div>
    <h1>💘 Cupido IA</h1>
    <p id="sub"></p>
  </header>

  <div id="zona" class="card">
    <img id="foto" alt="tu foto" />
    <div id="ph">
      <div class="em">📸</div>
      <p>Toma o sube tu foto</p>
      <small>La magia empieza aquí</small>
    </div>
    <div class="glow"></div>
  </div>

  <div class="foto-btns">
    <button id="btn-cam">📸 Tomar foto</button>
    <button id="btn-gal">🖼️ Galería</button>
  </div>

  <div id="tono">
    <button data-t="love" class="on">💘 Enamórame</button>
    <button data-t="real">😏 Sin filtros</button>
  </div>

  <button id="go" disabled>Elige una foto primero</button>
  <div id="estado"></div>

  <footer>Creado por <b>Jose F.</b> 💜 <b>Novaflow</b></footer>
</div>

<!-- MODAL RESULTADO -->
<div id="modal">
  <div class="pop">
    <button id="cerrar">✕</button>
    <div id="m-foto-wrap">
      <img id="m-foto" alt="" />
      <div id="m-score"><b id="m-score-n">0</b><small>/ 10</small></div>
    </div>
    <div id="m-body">
      <span id="m-tag"></span>
      <div id="m-texto"></div>
      <div id="m-firma">— Cupido IA 💋 · Novaflow</div>
      <div id="m-acc"> 
        <button id="m-otra">📸 Otra</button>
        <button id="m-share">📤 Compartir</button>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-cam" accept="image/*" capture="environment" />
<input type="file" id="file-gal" accept="image/*" />
<canvas id="lienzo" style="display:none"></canvas>

<script src="app.js"></script>
</body>
</html>
